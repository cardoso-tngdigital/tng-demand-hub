# =============================================================================
# CI — Type-check do TNG Demand Hub
# =============================================================================
# Roda em todo push em main e em PRs. Só type-check do TypeScript —
# a suite Vitest foi removida no Sprint 12 (pre-beta cleanup). Builds
# de desktop ficam no workflow release.yml (gatilhado por tags v*).
# =============================================================================

name: Type-check

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  typecheck:
    name: Type-check
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit
