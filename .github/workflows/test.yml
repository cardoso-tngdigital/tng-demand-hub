# =============================================================================
# CI — Testes do TNG Demand Hub
# =============================================================================
# Roda em todo push em main e em pull requests. Falha rápido (fail-fast) com
# type-check + suite de testes do Vitest. Não builda o app desktop aqui —
# isso é só do workflow release.yml.
# =============================================================================

name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Type-check + Vitest
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Type-check
        run: npx tsc --noEmit

      - name: Tests
        run: npm run test:run
